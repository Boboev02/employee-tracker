version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: et_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: saas_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d saas_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: et_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --notify-keyspace-events Kx
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev:
