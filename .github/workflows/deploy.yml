name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install backend dependencies
        run: cd apps/backend && npm install

      - name: Install frontend dependencies  
        run: cd apps/frontend && npm install

      - name: Build frontend
        run: cd apps/frontend && npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Create CI Dockerfiles
        run: |
          cat > apps/backend/Dockerfile.ci << 'DOCKERFILE'
          FROM node:22-alpine
          WORKDIR /app
          COPY apps/backend/package*.json ./
          COPY apps/backend/node_modules ./node_modules
          COPY apps/backend/ .
          RUN npx prisma generate
          RUN npm run build
          EXPOSE 3001
          CMD ["node", "dist/main.api.js"]
          DOCKERFILE

          cat > apps/frontend/Dockerfile.ci << 'DOCKERFILE'
          FROM node:20-alpine
          WORKDIR /app
          COPY apps/frontend/package*.json ./
          COPY apps/frontend/node_modules ./node_modules
          COPY apps/frontend/.next ./.next
          COPY apps/frontend/public ./public
          COPY apps/frontend/next.config.ts ./
          EXPOSE 3000
          CMD ["node_modules/.bin/next", "start"]
          DOCKERFILE

      - name: Build backend image
        run: docker buildx build --platform linux/amd64 -t et_backend:latest --load -f apps/backend/Dockerfile.ci .

      - name: Build frontend image
        run: docker buildx build --platform linux/amd64 -t et_frontend:latest --load -f apps/frontend/Dockerfile.ci .

      - name: Save images
        run: |
          docker save et_backend:latest | gzip > /tmp/et_backend.tar.gz
          docker save et_frontend:latest | gzip > /tmp/et_frontend.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/id_ed25519 /tmp/et_backend.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          scp -i ~/.ssh/id_ed25519 /tmp/et_frontend.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            docker load < /tmp/et_backend.tar.gz
            docker load < /tmp/et_frontend.tar.gz
            cd /root/employee-tracker
            docker compose up -d
            /usr/local/bin/update-nginx.sh
            rm /tmp/et_backend.tar.gz /tmp/et_frontend.tar.gz
            echo "Deploy complete!"
          '
